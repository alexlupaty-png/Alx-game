  <line x1="44" y1="112" x2="100" y2="112" stroke="url(#bar)" stroke-width="5" stroke-linecap="round"/>
  <!-- L -->
  <line x1="128" y1="44" x2="128" y2="148" stroke="url(#alx)" stroke-width="9" stroke-linecap="round"/>
