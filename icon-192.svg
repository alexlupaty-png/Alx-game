<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1A0F"/>
      <stop offset="50%" stop-color="#1A3320"/>
      <stop offset="100%" stop-color="#0A1A0C"/>
    </linearGradient>
    <linearGradient id="alx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F3EC"/>
      <stop offset="60%" stop-color="#EDE6D8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
