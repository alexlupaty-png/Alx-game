<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1A0F"/>
      <stop offset="50%" stop-color="#1A3320"/>
      <stop offset="100%" stop-color="#0A1A0C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(122,155,118,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="alx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F3EC"/>
      <stop offset="50%" stop-color="#EDE6D8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#A8906A"/>
      <stop offset="50%" stop-color="#E8C97A"/>
      <stop offset="70%" stop-color="#A8906A"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glo"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="rgba(122,155,118,0.2)" stroke-width="2"/>
  <!-- A -->
  <path d="M60,420 L192,92 L324,420" stroke="url(#alx)" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glo)"/>
  <line x1="110" y1="306" x2="274" y2="306" stroke="url(#bar)" stroke-width="14" stroke-linecap="round"/>
  <!-- L -->
  <line x1="358" y1="92" x2="358" y2="420" stroke="url(#alx)" stroke-width="22" stroke-linecap="round"/>
  <line x1="358" y1="420" x2="460" y2="420" stroke="url(#alx)" stroke-width="22" stroke-linecap="round"/>
  <!-- Wellness text -->
  <text x="256" y="476" font-family="Georgia,serif" font-size="28" font-weight="400" fill="rgba(201,168,76,0.55)" text-anchor="middle" letter-spacing="4">WELLNESS</text>
</svg>
